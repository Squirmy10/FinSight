<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fishing Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .form-popup {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      max-width: 280px;
      max-height: 90vh;
      overflow-y: auto;
      display: none;
      z-index: 1000;
    }

    input, select, button {
      width: 100%;
      margin-bottom: 6px;
      padding: 6px;
      font-size: 14px;
    }

    .username-popup {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 2000;
    }

    .more-info {
      display: none;
      margin-top: 6px;
      font-size: 13px;
    }

    .popup-button {
      margin-top: 6px;
      padding: 4px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="usernamePopup" class="username-popup" style="display:none;">
  <h4>Enter Username</h4>
  <input type="text" id="usernameInput" placeholder="Username" />
  <button onclick="saveUsername()">Save</button>
</div>

<div id="catchForm" class="form-popup">
  <h4>Log Catch</h4>

  <input type="text" id="waterBody" placeholder="Search Body of Water (Required)" />

  <select id="species"></select>
  <button onclick="addSpecies()">+ Add New Species</button>

  <input type="number" id="size" placeholder="Size (inches)" />
  <input type="number" id="weight" placeholder="Weight (lbs)" />
  <input type="text" id="bait" placeholder="Bait / Lure" />
  <input type="text" id="rig" placeholder="Rig Type" />
  <input type="text" id="retrieve" placeholder="Retrieve Style" />
  <input type="number" id="depth" placeholder="Depth (ft)" />
  <input type="number" id="waterTemp" placeholder="Water Temp (°F)" />

  <button onclick="saveCatch()">Save Catch</button>
  <button onclick="closeForm()">Cancel</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const defaultSpecies = [
    "Largemouth Bass",
    "Smallmouth Bass",
    "Rainbow Trout",
    "Crappie"
  ];

  function loadSpecies() {
    let speciesList = JSON.parse(localStorage.getItem("speciesList"));

    if (!speciesList) {
      speciesList = defaultSpecies;
      localStorage.setItem("speciesList", JSON.stringify(speciesList));
    }

    const speciesSelect = document.getElementById("species");
    speciesSelect.innerHTML = "";

    speciesList.forEach(species => {
      const option = document.createElement("option");
      option.value = species;
      option.textContent = species;
      speciesSelect.appendChild(option);
    });
  }

  function addSpecies() {
    const newSpecies = prompt("Enter new species name:");
    if (!newSpecies) return;

    let speciesList = JSON.parse(localStorage.getItem("speciesList"));
    speciesList.push(newSpecies);
    localStorage.setItem("speciesList", JSON.stringify(speciesList));

    loadSpecies();
  }

  function checkUsername() {
    const username = localStorage.getItem("username");
    if (!username) {
      document.getElementById("usernamePopup").style.display = "block";
    }
  }

  function saveUsername() {
    const username = document.getElementById("usernameInput").value;
    if (!username) return;

    localStorage.setItem("username", username);
    document.getElementById("usernamePopup").style.display = "none";
  }

  const map = L.map('map').setView([46.731, -117.179], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let tempMarker = null;
  let clickedLatLng = null;

  map.on('click', function(e) {
    if (tempMarker) map.removeLayer(tempMarker);

    clickedLatLng = e.latlng;
    tempMarker = L.marker(e.latlng).addTo(map);

    document.getElementById('catchForm').style.display = 'block';
  });

  function closeForm() {
    document.getElementById('catchForm').style.display = 'none';
    if (tempMarker) {
      map.removeLayer(tempMarker);
      tempMarker = null;
    }
  }

  function toggleMoreInfo(btn, id) {
    const el = document.getElementById(id);

    const isHidden = (el.style.display === "none" || el.style.display === "");

    if (isHidden) {
      el.style.display = "block";
      btn.textContent = "Less Information";
    } else {
      el.style.display = "none";
      btn.textContent = "More Information";
    }
  }

  function saveCatch() {
    const species = document.getElementById('species').value;
    const waterBody = document.getElementById('waterBody').value;

    if (!species || !waterBody) {
      alert("Species and Body of Water are required.");
      return;
    }

    const size = document.getElementById('size').value || "-";
    const weight = document.getElementById('weight').value || "-";
    const bait = document.getElementById('bait').value || "-";
    const rig = document.getElementById('rig').value || "-";
    const retrieve = document.getElementById('retrieve').value || "-";
    const depth = document.getElementById('depth').value || "-";
    const waterTemp = document.getElementById('waterTemp').value || "-";

    const username = localStorage.getItem("username");

    const id = "info-" + Date.now();

    const popup = `
      <b>${species}</b><br>
      Water: ${waterBody}<br>
      User: ${username}<br>
      <button class="popup-button" onclick="toggleMoreInfo(this,'${id}')">More Information</button>
      <div id="${id}" class="more-info">
        Size: ${size} in<br>
        Weight: ${weight} lb<br>
        Bait: ${bait}<br>
        Rig: ${rig}<br>
        Retrieve: ${retrieve}<br>
        Depth: ${depth} ft<br>
        Water Temp: ${waterTemp} °F
      </div>
    `;

    L.marker(clickedLatLng)
      .addTo(map)
      .bindPopup(popup);

    closeForm();
  }

  loadSpecies();
  checkUsername();
</script>

</body>
</html>
